<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stage II Topic Categories</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <p class="mode-label">Middle School Difficult Mode</p>
    <h1>Grade 7 Topic Practice</h1>

    <section id="topic-screen" class="screen">
      <p class="instruction">Choose a topic. Each topic has a short list of questions.</p>
      <div id="topic-list" class="topic-list"></div>
    </section>

    <section id="question-screen" class="screen hidden">
      <button type="button" id="back-button" class="text-button">Back to Topics</button>

      <p id="topic-name" class="topic-name"></p>
      <p id="question-count" class="question-count"></p>
      <h2 id="question-text"></h2>

      <div id="answer-list" class="answer-list"></div>

      <section id="feedback" class="feedback" aria-live="polite"></section>

      <button type="button" id="next-button" class="next-button" disabled>Next Question</button>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
